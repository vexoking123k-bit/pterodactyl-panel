version: '3.8'

services:
  database:
    image: mariadb:10.5
    restart: always
    networks:
      - pterodactyl
    volumes:
      - db_data:/var/lib/mysql
    command: --skip-ssl
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pterodactyl
      MYSQL_USER: pterodactyl
      MYSQL_PASSWORD: pterodactyl

  cache:
    image: redis:alpine
    restart: always
    networks:
      - pterodactyl

  panel:
    image: ghcr.io/pterodactyl/panel:latest
    restart: always
    networks:
      - pterodactyl
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - panel_var:/app/var/
      - panel_nginx:/etc/nginx/http.d/
      - panel_certs:/etc/letsencrypt/
      - panel_logs:/app/storage/logs
    environment:
      APP_URL: "http://localhost"
      APP_TIMEZONE: "UTC"
      APP_SERVICE_AUTHOR: "admin@wiskcraft.com"
      MAIL_FROM: "admin@wiskcraft.com"
      MAIL_DRIVER: "log"
      DB_HOST: "database"
      DB_PORT: "3306"
      DB_DATABASE: "pterodactyl"
      DB_USERNAME: "pterodactyl"
      DB_PASSWORD: "pterodactyl"
      CACHE_DRIVER: "redis"
      SESSION_DRIVER: "redis"
      QUEUE_DRIVER: "redis"
      REDIS_HOST: "cache"
      REDIS_PORT: "6379"
    depends_on:
      - database
      - cache

networks:
  pterodactyl:
    driver: bridge

volumes:
  db_data:
  panel_var:
  panel_nginx:
  panel_certs:
  panel_logs:
